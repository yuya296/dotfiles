model = "gpt-5.4"
network_access = true
model_reasoning_effort = "high"
experimental_use_rmcp_client = true
sandbox_mode = "workspace-write"
# notify = [ "bash", "/Users/yuya/.codex/notify.sh" ]
personality = "pragmatic"

[sandbox_workspace_write]
network_access = true
writable_roots = [ "/Users/yuya/.pm2" ]

[tools]
[profiles.sub-agent-base.mcp]
enabled = false

[projects."/Users/yuya/dev/vscode_extension--wysiwyg-editor"]
trust_level = "trusted"

[projects."/Users/yuya/tools"]
trust_level = "trusted"

[projects."/Users/yuya/dev/codex-agent"]
trust_level = "trusted"

[projects."/Users/yuya/dev"]
trust_level = "trusted"

[projects."/Users/yuya/.config/zsh"]
trust_level = "trusted"

[notice]
"hide_gpt-5.1-codex-max_migration_prompt" = true

[notice.model_migrations]
"gpt-5.1-codex-mini" = "gpt-5.2-codex"

[mcp_servers.context7]
command = "npx"
args = [ "-y", "@upstash/context7-mcp" ]

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp"
enabled = false

[mcp_servers.github.env_http_headers]
Authorization = "GITHUB_PAT_BEARER"

[mcp_servers.figma-desktop]
url = "http://127.0.0.1:3845/mcp"
enabled = false

[mcp_servers.mobile]
command = "npx"
args = [ "-y", "@mobilenext/mobile-mcp@latest" ]
enabled = false

[mcp_servers.notion]
url = "https://mcp.notion.com/mcp"
enabled = false

[mcp_servers.figma]
url = "https://mcp.figma.com/mcp"
enabled = false

[mcp_servers.pencil]
command = "/Applications/Pencil.app/Contents/Resources/app.asar.unpacked/out/mcp-server-darwin-arm64"
args = [ "--app", "desktop" ]

[features]
unified_exec = true
shell_snapshot = true
steer = true
apps = true
multi_agent = true

[tui]
status_line = ["model-with-reasoning", "context-remaining", "current-dir", "git-branch", "context-used", "five-hour-limit"]
